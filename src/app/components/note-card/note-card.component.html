<div class="bg-white rounded-lg shadow-md p-4 hover:shadow-lg transition-shadow">
  <h3 class="text-lg font-semibold text-gray-800 mb-2 truncate">
    {{ note.title }}
  </h3>
  <p class="text-gray-600 text-sm mb-4 line-clamp-3">
    {{ note.content }}
  </p>
  <div class="flex justify-between items-center text-xs text-gray-500 mb-4">
    <span>{{ formatDate(note.createdAt) }}</span>
  </div>
  <div class="flex gap-2">
    <button
      (click)="handleEdit()"
      class="flex-1 bg-blue-500 hover:bg-blue-600 text-white py-2 rounded-md text-sm font-medium transition"
    >
      Edit
    </button>
    <button
      (click)="handleDelete()"
      class="flex-1 bg-red-500 hover:bg-red-600 text-white py-2 rounded-md text-sm font-medium transition"
    >
      Hapus
    </button>
  </div>
</div>
