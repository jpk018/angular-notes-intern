<form (ngSubmit)="handleSubmit()" class="bg-white rounded-lg shadow-md p-6 mb-6">
  <div class="mb-4">
    <label for="title" class="block text-sm font-medium text-gray-700 mb-2">
      Judul
    </label>
    <input
      id="title"
      type="text"
      [(ngModel)]="title"
      name="title"
      placeholder="Masukkan judul note"
      class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
    />
  </div>

  <div class="mb-6">
    <label for="content" class="block text-sm font-medium text-gray-700 mb-2">
      Isi
    </label>
    <textarea
      id="content"
      [(ngModel)]="content"
      name="content"
      placeholder="Masukkan isi note"
      rows="5"
      class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none resize-none"
    ></textarea>
  </div>

  <div class="flex gap-3">
    <button
      type="submit"
      class="flex-1 bg-blue-500 hover:bg-blue-600 text-white py-2 rounded-lg font-medium transition"
    >
      {{ editingNote ? 'Update' : 'Buat' }} Note
    </button>
    <button
      *ngIf="editingNote"
      type="button"
      (click)="handleCancel()"
      class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 py-2 rounded-lg font-medium transition"
    >
      Batal
    </button>
  </div>
</form>
