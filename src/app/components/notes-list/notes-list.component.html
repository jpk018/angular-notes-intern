<div *ngIf="notes.length === 0" class="text-center py-12">
  <p class="text-gray-500">Tidak ada notes. Mulai buat satu!</p>
</div>

<div *ngIf="notes.length > 0" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
  <app-note-card
    *ngFor="let note of notes"
    [note]="note"
    (onDelete)="handleDelete($event)"
    (onEdit)="handleEdit($event)"
  ></app-note-card>
</div>
